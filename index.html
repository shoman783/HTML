<html>

<head>
    <meta charset="UTF-8" />
    <title>Job Application</title>
</head>

<body>
    <h1>Job Application</h1>
    <p>Fill in all sections to complete your application.</p>
    <form>
        <fieldset>
            <legend>Personal Information</legend>
            <div>
                <div>
                    <label for="fn">First name</label>
                    <input type="text" id="fn" name="first_name" placeholder="First name..." />
                </div>
                <br>
                <div>
                    <label for="ln">Last name</label>
                    <input type="text" id="ln" name="last_name" placeholder="Last name..." />
                </div>
            </div>
            <br>
            <div>
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="email@example.com" />
                </div>
                <br>
                <div>
                    <label for="phone">Telephone number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Numbers only..." />
                </div>
            </div>
            <br>
            <div>
                <div>
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" placeholder="18 – 100" min="18" max="100" />
                </div>
                <br>
                <div>
                    <label>Gender</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="gender" value="male" /> Male
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="gender" value="female" /> Female
                        </label>
                    </div>
                </div>
            </div>
        </fieldset>
        <fieldset>
            <legend>Location</legend>
            <div>
                <label for="con2">Where are you from</label>
                <select name="country" id="con2">
                    <optgroup label="Middle East">
                        <option selected value="egypt">Egypt</option>
                        <option value="sudan">Sudan</option>
                        <option value="iran">Iran</option>
                    </optgroup>
                    <optgroup label="West">
                        <option value="uk">UK</option>
                        <option value="usa">USA</option>
                    </optgroup>
                </select>
            </div>
        </fieldset>
        <fieldset>
            <legend>Skills</legend>
            <div class="checkbox-group">
                <label class="check-label">
                    <input type="checkbox" name="skills" value="html" /> HTML
                </label>
                <label class="check-label">
                    <input type="checkbox" name="skills" value="css" /> CSS
                </label>
                <label class="check-label">
                    <input type="checkbox" name="skills" value="js" /> JavaScript
                </label>
                <label class="check-label">
                    <input type="checkbox" name="skills" value="node.js" /> Node.js
                </label>
            </div>
        </fieldset>
        <fieldset>
            <legend>Professional Documents</legend>
            <div>
                <label for="cv">Attach CV</label>
                <input type="file" id="cv" name="cv" accept="application/pdf" />
                <p class="hint">PDF files only</p>
            </div>
            <div>
                <label for="sample">Attach work sample</label>
                <input type="url" id="sample" name="sample" placeholder="https://..." />
            </div>
        </fieldset>
        <fieldset>
            <legend>Job Preferences</legend>
            <div>
                <label for="con1">Company branch</label>
                <input list="con" id="con1" name="branch" placeholder="Choose or type..." />
                <datalist id="con">
                    <option value="Egypt"></option>
                    <option value="Sudan"></option>
                    <option value="Iran"></option>
                    <option value="UK"></option>
                    <option value="USA"></option>
                </datalist>
            </div>
            <br>
            <div>
                <label for="date">Preferred interview date</label>
                <input type="date" id="date" name="date" />
            </div>
        </fieldset>
        <fieldset>
            <legend>Account</legend>
            <div>
                <label for="pas">Create password</label>
                <input type="password" id="pas" name="password" placeholder="8 characters or more..." minlength="8" />
            </div>
        </fieldset>
        <fieldset>
            <legend>Additional Notes</legend>
            <div>
                <label for="notes">Comments</label>
                <textarea id="notes" name="notes" rows="4" placeholder="Any comments...?"></textarea>
            </div>
        </fieldset>
        <button type="submit">Send Application</button>
    </form>
</body>

</html>
